<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e293b" />
  <meta name="description" content="Explora los Best Sellers del New York Times en esta Progressive Web App" />
  <title>NYT Books Explorer</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="navbar">
  <div class="logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
    NYT Books
  </div>

  <nav class="menu">
    <button onclick="bestSellers()" class="active" id="btn-bestsellers">Best Sellers</button>
    <button onclick="verCategorias()" id="btn-categorias">Categorías</button>
    <button onclick="verHistorial()" id="btn-historial">Historial</button>
  </nav>

  <div class="search-group">
    <div class="search-input">
      <input id="inputTitulo" placeholder="Título...">
      <button onclick="buscarTitulo()" title="Buscar Título">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    
    <div class="search-input">
      <input id="inputAutor" placeholder="Autor...">
      <button onclick="buscarAutor()" title="Buscar Autor">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>

    <div class="search-input date-input-group">
      <input type="date" id="inputFecha" title="Buscar por fecha">
      <button onclick="buscarPorFecha()" title="Buscar Fecha">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      </button>
    </div>
  </div>
</header>

<main class="main-content">
  <!-- Titulo de la sección actual -->
  <h2 id="section-title" class="section-title">Best Sellers</h2>

  <!-- LOADER -->
  <div id="loader" class="loader-container hidden">
    <div class="spinner"></div>
    <p>Cargando increíbles historias...</p>
  </div>

  <!-- ERROR / EMPTY STATE -->
  <div id="empty-state" class="empty-state hidden">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/><path d="M8 7h8"/><path d="M8 11h8"/></svg>
    <h3 id="empty-title">Sin resultados</h3>
    <p id="empty-desc">No pudimos encontrar lo que buscas. Intenta con otros términos.</p>
  </div>

  <!-- FILTROS -->
  <div id="filtros-container" class="filtros-container"></div>

  <!-- CONTENIDO (GRID) -->
  <div id="contenedor" class="grid-container"></div>
</main>

<script src="script.js"></script>
</body>
</html>
